version: '3.8'

services:
  mysql-source:
    image: mysql:8.0
    container_name: mysql-source
    # my.cnf 대신 command로 설정 직접 주입!
    command: --server-id=1 --log-bin=mysql-bin --binlog-format=ROW
    environment:
      MYSQL_ROOT_PASSWORD: '1234'
      MYSQL_DATABASE: sample_db
    ports:
      - "3308:3306"
    volumes:
      # my.cnf 마운트는 삭제하고 계정 생성 sql 폴더만 남김
      - ./source/init:/docker-entrypoint-initdb.d
    networks:
      - db-network

  mysql-replica:
    image: mysql:8.0
    container_name: mysql-replica
    # my.cnf 대신 command로 설정 직접 주입!
    command: --server-id=2 --read-only=1
    environment:
      MYSQL_ROOT_PASSWORD: '1234'
    ports:
      - "3309:3306"
    # volumes(my.cnf 마운트) 항목 완전 삭제
    networks:
      - db-network
    depends_on:
      - mysql-source

networks:
  db-network:
    driver: bridge